services:
  neo4j:
    image: neo4j:5-community
    container_name: urbot-neo4j
    ports:
      - "7891:7687"   # Bolt protocol
      - "8892:7474"   # HTTP browser
    environment:
      - NEO4J_AUTH=neo4j/urbot123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - urbot_neo4j_data:/data
      - urbot_neo4j_logs:/logs

  astrology-api:
    profiles:
      - astrology
    build:
      context: .
      dockerfile: Dockerfile.astrology-api
    container_name: botforge-astrology-api
    profiles:
      - astrology
    ports:
      - "3000:3000"

volumes:
  botforge-neo4j-data:
  botforge-postgres-data:
  botforge-redis-data:
