# Architect Bot Profile Properties
# ------------------------------

# Persona and Objective templates
botforge.chat.persona=architect
botforge.chat.objective=architect

# LLM Configuration for architectural explorations
botforge.chat.llm.model=gpt-4.1-mini
botforge.chat.llm.temperature=0.7

# Soft response limit
botforge.chat.max-words=400

# Package scanning for Architect-specific components
botforge.bot-packages=org.legendstack.bot.architect
botforge.memory.entity-packages=org.legendstack.bot.architect.domain

# Knowledge Bootstrap - Standards and Patterns
botforge.initial-documents=workspace/enterprise-standards.md
